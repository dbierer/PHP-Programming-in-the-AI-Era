server {
    listen 80;
    server_name symfony.test;
    root /repo/symfony.test/public;
    access_log /var/log/nginx/symfony.test.access.log;
    error_log /var/log/nginx/symfony.test.error.log;
    location / {
        try_files $uri /index.php?$query_string;
    }
    location ~ \.php$ {
        include fastcgi.conf;
        fastcgi_pass 10.10.90.88:9000;
    }
}
